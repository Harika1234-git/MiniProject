<!DOCTYPE html>
{% load static %}
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Lungcancer using CT images{% endblock %}</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome for Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- Theme overrides -->
  <style>
    /* Optional: fine-tune dark mode surface & text */
    [data-bs-theme="dark"] {
      color-scheme: dark;
      --bs-body-bg: rgba(0,0,0,0.35);
      --bs-body-color: #e9eef3;
      --bs-card-bg: rgba(17,22,29,0.7);
      --bs-border-color: #2c394a;
      --bs-link-color: #77b5ff;
      --bs-link-hover-color: #9bc9ff;
      --bs-navbar-color: rgba(255,255,255,.85);
      --bs-navbar-hover-color: #fff;
      --bs-navbar-brand-color: #fff;
      --bs-navbar-brand-hover-color: #fff;
      --bs-footer-bg: rgba(0,0,0,0.65);
    }

    /* Ensure content stays legible over image */
    .glass {
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      background: rgba(17, 22, 29, 0.55);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: .75rem;
    }

    /* Optional: adjust container spacing for center layout */
    main .container {
      max-width: 900px;
    }

    /* Footer uses the variable-defined background */
    footer.bg-dark {
      background-color: var(--bs-footer-bg) !important;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100"
  style="background: url('{% static "img/bg1.jpg" %}') no-repeat center center fixed; background-size: cover;">

  <!-- Navbar (component-level color mode recommended in 5.3) -->
  <nav class="navbar navbar-expand-lg bg-dark shadow border-bottom border-body" data-bs-theme="dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'index' %}">Lungcancer using CT images</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'loginn' %}">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'register' %}">Register</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="p-4 p-md-5 glass shadow-sm">
        {% block content %}
        <!-- Django Messages -->
        {% endblock %}
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">&copy; 2025 Lungcancer using CT images. All rights reserved.</p>
  </footer>

  <!-- Optional theme toggle -->
  <div class="position-fixed bottom-0 end-0 p-3">
    <button id="themeToggle" class="btn btn-outline-light btn-sm">Toggle theme</button>
  </div>
  <script>
    const root = document.documentElement;
    const getMode = () => root.getAttribute('data-bs-theme') || 'light';
    document.getElementById('themeToggle').addEventListener('click', () => {
      root.setAttribute('data-bs-theme', getMode() === 'dark' ? 'light' : 'dark');
    });
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
