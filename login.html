{% extends 'base.html' %}
{% block title %}Login - MySite{% endblock %}

{% block content %}
<div class="col-md-6 col-lg-5 mx-auto p-0">
  <div class="glass p-4 p-md-5 rounded shadow-lg">
    <h2 class="fw-bold mb-4 text-center text-body-emphasis">Login</h2>

    {% if messages %}
    <div class="container mb-4 px-0">
      {% for message in messages %}
        <div class="alert 
                    {% if message.tags == 'error' %}alert-danger
                    {% elif message.tags == 'success' %}alert-success
                    {% elif message.tags == 'warning' %}alert-warning
                    {% else %}alert-info{% endif %} 
                    alert-dismissible fade show shadow-sm mb-3" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    </div>
    {% endif %}

    <form action="{% url 'user_login' %}" method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <input type="text" name="username" class="form-control" placeholder="Your Username" required>
      </div>
      <div class="mb-4">
        <input type="password" class="form-control" name="password" placeholder="Your Password" required>
      </div>
      <div class="text-center">
        <button type="submit" class="btn btn-primary px-5 py-2 rounded-pill shadow">
          <i class="fas fa-sign-in-alt me-1"></i> Login
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
